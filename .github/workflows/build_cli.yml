name: Build .NET CLI Project

on:
  workflow_call:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: gobo-linux-x64
            zip: gobo-linux-x64.zip
          - os: windows-latest
            rid: win-x64
            artifact: gobo-windows-x64
            zip: gobo-windows-x64.zip
          - os: macos-latest
            rid: osx-arm64
            artifact: gobo-macos-arm64
            zip: gobo-macos-arm64.zip
          - os: macos-latest
            rid: osx-x64
            artifact: gobo-macos-x64
            zip: gobo-macos-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: .NET Publish
        run: dotnet publish Gobo.Cli/Gobo.Cli.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish

      - name: Compress (Linux/macOS)
        if: runner.os != 'Windows'
        run: cd publish && zip ../${{ matrix.zip }} gobo

      - name: Compress (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path ./publish/gobo.exe -DestinationPath ./${{ matrix.zip }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./${{ matrix.zip }}
          if-no-files-found: error
